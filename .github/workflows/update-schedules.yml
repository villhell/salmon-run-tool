name: Update Schedules
on:
  schedule:
    - cron: '0 * * * *'   # 毎時
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch schedules
        run: |
          mkdir -p data
          curl -s -H "User-Agent: salmon-run-tool/1.0" \
               -o data/schedules.json \
               https://splatoon3.ink/data/schedules.json
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedules.json
          git diff --cached --quiet || \
            (git commit -m "chore: update schedules data" && git push)
